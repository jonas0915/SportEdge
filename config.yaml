odds_api:
  poll_interval_min: 90
  lookahead_hours: 6
  monthly_credit_budget: 500
  regions: ["us"]
  markets: ["h2h"]

alerts:
  score_threshold: 7.0
  min_edge: 0.05
  pre_game_hours: 2
  min_alert_score: 0.005  # only alert on picks above this score

model:
  elo_weight: 0.4
  min_predictions_for_confidence: 50
  default_confidence: 0.5

kelly:
  fraction: 0.25
  max_stake_pct: 0.05

dashboard:
  port: 8080
  refresh_seconds: 300
  timezone_display: "US/Pacific"

telegram:
  enabled: true
  min_alert_score: 0.005

props:
  enabled: true
  sports: ["basketball_nba"]
  markets: ["player_points", "player_rebounds", "player_assists", "player_threes"]
  min_edge: 0.05
  poll_interval_min: 60

kalshi:
  enabled: true
  base_url: "https://api.elections.kalshi.com/trade-api/v2"
  poll_interval_min: 30
  sports_series: ["KXNBA", "KXNFL", "KXMLB", "KXNHL", "KXSB"]
